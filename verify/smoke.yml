# smoke.yml -- fast surface checks run on every PR
#
# Supported assertion types:
#   http_status       -- checks HTTP response code matches `expect`
#   text_present      -- checks that `text` appears in the response body
#   selector_present  -- checks that a CSS selector matches at least one element
#   header_present    -- checks that the named response header exists
#   redirects_to      -- checks that the URL redirects to `expect` (final URL)
#   json_path_equals  -- checks that a JSONPath expression equals `expect`

target: lumen-analytics
deploy_url: https://lumenanalytics.projectnexuscode.org

surfaces:
  - name: home
    url: /
    assertions:
      - { type: http_status, expect: 200 }
      - { type: text_present, text: "See changes in your business" }
      - { type: text_present, text: "Open the live demo" }
      - { type: header_present, header: "Strict-Transport-Security" }

  - name: app-redirect
    url: /app
    assertions:
      # /app requires lumen_demo_session cookie; unauthenticated request
      # must redirect back to the landing page
      - { type: redirects_to, expect: "https://lumenanalytics.projectnexuscode.org/?signin=required" }

  - name: anomaly-log
    url: /app/anomalies
    assertions:
      # Also redirects to landing when unauthenticated
      - { type: redirects_to, expect: "https://lumenanalytics.projectnexuscode.org/?signin=required" }

  - name: anomaly-api
    url: /api/anomalies/1
    assertions:
      # Returns 404 JSON for unknown id (no session required for API route)
      - { type: http_status, expect: 404 }
      - { type: text_present, text: "Anomaly not found" }

  - name: team-api
    url: /api/team
    assertions:
      - { type: http_status, expect: 200 }
      - { type: text_present, text: "Priya" }

  - name: session-api
    url: /api/session?signout=1
    assertions:
      # GET with signout=1 clears cookie and 303-redirects to /
      - { type: redirects_to, expect: "https://lumenanalytics.projectnexuscode.org/" }
