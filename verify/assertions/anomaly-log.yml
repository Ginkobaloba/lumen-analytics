# assertions/anomaly-log.yml -- full assertion set for the anomaly log surface
#
# Route: /app/anomalies (requires lumen_demo_session cookie)
# This is a tier-3 surface: the anomaly log is the primary entry point for
# the demo's headline story. Deep verify is required before any merge that
# touches this surface or its backend.
#
# NOTE: assertions that require authentication must be run with a valid
# lumen_demo_session cookie injected by the verify harness. The quick smoke
# check on /app/anomalies confirms the redirect; this deep file is for a
# session-aware browser run.

surface: anomaly-log
url: /app/anomalies

# Authentication context required for browser-layer assertions below.
# The verify harness should POST /api/session first to obtain the cookie,
# then load this URL.
requires_session: true

assertions:
  # With session: expect the page itself, not a redirect
  - { type: http_status, expect: 200 }

  # Page heading (matches h1 in AnomaliesPage)
  - { type: text_present, text: "Anomalies" }
  - { type: text_present, text: "Everything the detector flagged" }
  - { type: text_present, text: "cause attribution and triage" }

  # The three scripted anomalies must appear in the log.
  # Titles are generated by the detect script from the metric + direction.
  # These partial strings match the expected narrative for each episode.
  - { type: text_present, text: "Churn" }
  - { type: text_present, text: "Expansion" }
  - { type: text_present, text: "Feature Adoption" }

  # Severity badges -- all three scripted anomalies are high/critical
  - { type: text_present, text: "high" }

  # DOM selectors (browser-layer)
  - { type: selector_present, selector: "h1" }
  # AnomalyLog table or list container
  - { type: selector_present, selector: "table, [role='table'], [data-anomaly-log]" }
  # At least one clickable row (the scripted anomalies must be present)
  - { type: selector_present, selector: "tbody tr, [role='row']" }
  # Filter controls rendered by AnomalyLog
  - { type: selector_present, selector: "input[type='search'], input[placeholder], select, [role='combobox']" }

  # Quality gates (local deep run)
  - { type: no_console_errors }
  - { type: lcp_under_ms, expect: 3000 }
  - { type: axe_no_critical }
